<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>document.documentElement.lang=navigator.language&&navigator.language.startsWith("en")?"en":"es"</script>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Defihaus — Narvarte</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='20'/><text x='50' y='62' text-anchor='middle' fill='%23e5e5e5' font-family='system-ui' font-size='40' font-weight='700'>D</text></svg>">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#e5e5e5;font-family:'DM Sans',-apple-system,system-ui,sans-serif;min-height:100vh;user-select:none}
.brand{font-size:10px;letter-spacing:4px;color:#3a3a3a;text-transform:uppercase;font-weight:600;text-align:center;padding:48px 0 32px}
#content{display:flex;flex-direction:column;align-items:center;padding:0 20px}

/* Door */
.door-section{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.circle{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;transition:all .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.circle.idle{background:radial-gradient(circle,#171717,#0f0f0f 50%,#0a0a0a);border:2px solid #2a2a2a;box-shadow:0 0 40px rgba(0,0,0,.4)}
.circle.opening{background:radial-gradient(circle,#1e1b4b,#0f0a2e 50%,#0a0a0a);border:2px solid #818cf8;box-shadow:0 0 60px rgba(129,140,248,.15);cursor:default}
.circle.success{background:radial-gradient(circle,#065f46,#064e3b 50%,#0a0a0a);border:2px solid #34d399;box-shadow:0 0 80px rgba(52,211,153,.2);cursor:default}
.circle.error{background:radial-gradient(circle,#2a0a0a,#0a0a0a);border:2px solid #f87171;box-shadow:0 0 40px rgba(248,113,113,.1);cursor:default}
.circle.rate{background:radial-gradient(circle,#2a1a0a,#0a0a0a);border:2px solid #fb923c;cursor:default}
.circle.inactive{background:radial-gradient(circle,#0f0f0f,#0a0a0a);border:2px solid #1a1a1a;cursor:default}
.label{font-size:17px;font-weight:600;margin-bottom:6px;transition:color .3s;text-align:center}
.sublabel{font-size:11px;color:#3a3a3a}
.spinner{width:40px;height:40px;border:2px solid #2a2a4a;border-top:2px solid #818cf8;border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{display:inline-block;width:18px;height:18px;border:2px solid #1a1a1a;border-top:2px solid #525252;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
#app{opacity:0;transition:opacity .3s}
#app.ready{opacity:1}

/* PIN */
.pin-container{text-align:center;width:100%;max-width:320px}
.pin-icon{width:72px;height:72px;border-radius:50%;background:#141414;border:1px solid #1f1f1f;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.pin-title{font-size:16px;font-weight:600;color:#d4d4d4;margin-bottom:6px}
.pin-sub{font-size:13px;color:#525252;margin-bottom:24px}
.pin-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.pin-digit{width:46px;height:54px;background:#141414;border:1px solid #262626;border-radius:10px;color:#e5e5e5;font-size:24px;text-align:center;outline:none;font-family:'Courier New',monospace;font-weight:700;-webkit-appearance:none}
.pin-digit:focus{border-color:#525252}
.pin-digit.err{border-color:#f87171}
.pin-btn{width:100%;padding:15px;background:#e5e5e5;color:#0a0a0a;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-btn:disabled{background:#1a1a1a;color:#3a3a3a;cursor:default}
.pin-error{font-size:13px;color:#f87171;margin-top:10px}

/* Guide section */
.guide{width:100%;max-width:420px;margin:0 auto;padding:0 0 60px}
.guide-hero{text-align:center;padding:32px 0 8px}
.guide-hero h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.guide-hero p{font-size:12px;color:#525252;line-height:1.5}
.guide-divider{height:1px;background:linear-gradient(90deg,transparent,#262626,transparent);margin:20px 0}

/* Cards */
.card{background:#141414;border:1px solid #1f1f1f;border-radius:14px;margin-bottom:10px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.card-hl{display:flex;align-items:center;gap:10px}
.card-ico{font-size:18px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:#1a1a1a}
.card-t{font-size:14px;font-weight:600;color:#d4d4d4}
.card-badge{font-size:9px;color:#525252;background:#1a1a1a;padding:2px 7px;border-radius:4px;margin-left:6px}
.chev{color:#3a3a3a;transition:transform .3s;font-size:11px}
.chev.open{transform:rotate(180deg)}
.card-b{display:none;padding:0 16px 14px}
.card-b.open{display:block}

/* Place items */
.place{padding:12px 0;border-bottom:1px solid #1a1a1a}
.place:last-child{border-bottom:none}
.place-name{font-size:13px;font-weight:600;color:#e5e5e5;margin-bottom:2px}
.place-cat{font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.place-desc{font-size:12px;color:#737373;line-height:1.5;margin-bottom:4px}
.place-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#525252}
.place-meta span{display:flex;align-items:center;gap:3px}

/* WiFi */
.wifi-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a}
.wifi-item:last-child{border-bottom:none}
.wifi-name{font-size:12px;color:#737373}
.wifi-val{font-family:'Courier New',monospace;font-size:12px;color:#e5e5e5;background:#1a1a1a;padding:3px 8px;border-radius:4px;cursor:pointer}
.wifi-pass{margin-top:10px;padding:10px 12px;background:#1a1a1a;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.wifi-pass-l{font-size:11px;color:#525252}
.wifi-pass-v{font-family:'Courier New',monospace;font-size:13px;color:#4ade80;cursor:pointer}

/* Rules */
.rule{padding:5px 0;display:flex;gap:8px;align-items:flex-start}
.rule em{font-size:14px;flex-shrink:0;font-style:normal}
.rule span{font-size:12px;color:#a3a3a3;line-height:1.5}

/* Transport */
.metro-line{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:2px 4px 2px 0}
.ml-3{background:#4a7c3f;color:#fff}
.ml-9{background:#6e3a20;color:#fff}
.ml-12{background:#a68b2c;color:#fff}
.metro-station{padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:12px;color:#a3a3a3;line-height:1.5}
.metro-station:last-child{border-bottom:none}
.metro-station strong{color:#e5e5e5;font-weight:600}

/* Tips */
.tip{padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:12px;color:#a3a3a3;line-height:1.6}
.tip:last-child{border-bottom:none}
.tip strong{color:#d4d4d4}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#34d399;color:#0a0a0a;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* Emergency */
.emergency{display:flex;align-items:center;gap:10px;padding:12px;background:#1a1a1a;border-radius:10px;margin-top:6px}
.emergency-ico{font-size:20px}
.emergency-info{flex:1}
.emergency-info div:first-child{font-size:13px;font-weight:600;color:#e5e5e5}
.emergency-info div:last-child{font-size:11px;color:#525252}
</style>
</head>
<body>
<div id="app">

<script>

let doorState="idle",currentPin="";

  tipTips:isEn?"<strong>Tipping:</strong> 10-15% at restaurants. At street taco stands it's not mandatory but leaving change is appreciated.":"${L.tipTips}",

  tipCentro:isEn?"<strong>Historic Center:</strong> 20 min by metro (L3 towards Indios Verdes, exit at Hidalgo or Bellas Artes). Zócalo, National Palace, Templo Mayor.":"${L.tipCentro}",
  tipCoyoacan:isEn?"<strong>Coyoacán:</strong> 15 min by metro (L3 towards Universidad, exit at Coyoacán). Frida Kahlo House, artisan market, ice cream in the garden.":"${L.tipCoyoacan}",
  emergency:isEn?"Emergencies":"Emergencias",
  emer911:isEn?"Emergencies: 911":"${L.emer911}",
  emer911sub:isEn?"Police, ambulance, firefighters":"${L.emer911sub}",
  emerHosp:isEn?"Hospital Ángeles del Pedregal":"Hospital Ángeles del Pedregal",
  emerHospSub:isEn?"Nearby private hospital":"${L.emerHospSub}",
  emerPharm:isEn?"Farmacias del Ahorro / Similares":"Farmacias del Ahorro / Similares",
  emerPharmSub:isEn?"Several in the area, some 24h":"${L.emerPharmSub}",
  rules:isEn?"House Rules":"Reglas de la casa",
  r1:isEn?"No visitors or additional guests beyond those registered are allowed.":"${L.r1}",

  r5:isEn?"After using the kitchen, wash and leave everything clean.":"${L.r5}",
  r6:isEn?"Keep common areas clean and tidy. Don't leave personal items in common areas.":"${L.r6}",
  r7:isEn?"Trash must be disposed of daily in the container on the ground floor, just below the apartment.":"${L.r7}",
  r8:isEn?"Make sure to lock doors and windows when leaving.":"${L.r8}",
  r9:isEn?"Take care of our home as if it were yours.":"${L.r9}",
  bye:isEn?"We appreciate your respect and cooperation<br>Enjoy Narvarte!":"${L.bye}",
  copied:isEn?"Copied":"Copiado",
  noAccess:isEn?"Access not available":"Acceso no disponible",
  noResSub:isEn?"No active reservation at this time":"No hay reserva activa en este momento",
  walk:isEn?"walk":"caminando",
  // Place descriptions
  vilsitoDesc:isEn?"By day it's a car repair shop, by night it's Narvarte's most legendary taco stand. Featured on Netflix's Taco Chronicles. The pastor is spectacular.":"${L.vilsitoDesc}",

  antenatiDesc:isEn?"Specialty coffee + Saturday workshops: ceramics, jewelry, watercolor, embroidery. Check their IG for the calendar.":"${L.antenatiDesc}",
  secretDesc:isEn?"Hidden behind a normal house. Brioche bun burgers dripping with cheese, boneless, ribs. The corn cake dessert is a must.":"${L.secretDesc}",
  lupuloDesc:isEn?"Artisan pizza and beer in a chill atmosphere. Perfect for hours of conversation.":"${L.lupuloDesc}",

  cinetecaDesc:isEn?"Mexico's temple of cinema. Art films, festivals, documentaries. 15 min by Uber.":"${L.cinetecaDesc}",
  parqueDesc:isEn?"The locals' favorite park. Dog zone, green area, great for running or reading.":"${L.parqueDesc}",
  temploDesc:isEn?"Iconic church designed by Félix Candela. Its hyperbolic structure is a masterpiece of modern architecture.":"${L.temploDesc}",
  wtcDesc:isEn?"Convention center and events venue. Concerts, expos and the revolving restaurant Bellini on the 45th floor.":"${L.wtcDesc}",
  glorietaDesc:isEn?"The heart of Narvarte. The fountain surrounded by palm trees where the main avenues converge. Perfect for strolling.":"${L.glorietaDesc}",

function renderLoading(){$("content").innerHTML='<div class="spinner-sm"></div><div style="font-size:13px;color:#525252">${L.loading}</div>';$("app").classList.add("ready")}

function renderPinEntry(){
$("content").innerHTML=`
<div class="pin-container">
  <div class="pin-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#525252" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 5-5v0a5 5 0 0 1 5 5v4"/></svg></div>
  <div class="pin-title">${L.pinTitle}</div>
  <div class="pin-sub">${L.pinSub}</div>
  <div class="pin-inputs"><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="0" autofocus><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="1"><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="2"><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="3"><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="4"><input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" data-i="5"></div>
  <button class="pin-btn" id="pinBtn" onclick="verifyPin()" disabled>${L.verify}</button>
  <div class="pin-error" id="pinError"></div>
</div>`;
const d=document.querySelectorAll(".pin-digit");
d.forEach((el,i)=>{el.addEventListener("input",()=>{el.value=el.value.replace(/[^0-9]/g,"");if(el.value&&i<5)d[i+1].focus();updBtn()});el.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!el.value&&i>0){d[i-1].focus();d[i-1].value=""}});el.addEventListener("paste",e=>{e.preventDefault();const t=(e.clipboardData||window.clipboardData).getData("text").replace(/[^0-9]/g,"");for(let j=0;j<Math.min(t.length,6);j++)d[j].value=t[j];if(t.length>=6)d[5].focus();updBtn()})})
}
function updBtn(){const d=document.querySelectorAll(".pin-digit");currentPin=Array.from(d).map(x=>x.value).join("");$("pinBtn").disabled=currentPin.length!==6}

async function verifyPin(){$("pinBtn").disabled=true;$("pinBtn").textContent=L.verifying;$("pinError").textContent="";
try{const r=await fetch(WORKER_URL+"/api/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:currentPin})});const d=await r.json();
if(d.valid){renderActive(d,currentPin)}
else if(d.error==="wrong_pin"){$("pinError").textContent=L.wrongPin;document.querySelectorAll(".pin-digit").forEach(x=>{x.classList.add("err");x.value=""});document.querySelector(".pin-digit").focus();$("pinBtn").textContent=L.verify}
else if(d.error==="no_reservation"){$("pinError").textContent=L.noRes;$("pinBtn").textContent=L.verify}
else{$("pinError").textContent=L.errGeneric;$("pinBtn").textContent=L.verify}
}catch(e){$("pinError").textContent=L.errConn;$("pinBtn").textContent=L.verify}}

function renderActive(data,pin){
const co=data.checkOut?new Date(data.checkOut).toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
$("content").innerHTML=`
<div class="door-section">
  <div style="font-size:14px;color:#525252;margin-bottom:24px">${L.welcome}</div>
  <div class="circle idle" id="door" onclick="openDoor()"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <div class="label" id="doorLabel" style="color:#e5e5e5">${L.tapOpen}</div>
  ${co?'<div class="sublabel">${L.accessUntil} '+co+'</div>':""}
</div>
<div class="guide">
  <div class="guide-divider"></div>

  <!-- WiFi -->
  <div class="card"><div class="card-h" onclick="tog(this)"><div class="card-hl"><div class="card-ico">📶</div><div class="card-t">WiFi</div></div><div class="chev">▼</div></div>
  <div class="card-b">
    <div class="wifi-item"><span class="wifi-name">Red general (5G)</span><span class="wifi-val" onclick="cp('Totalplay-D4B5-5G-EXT')">Totalplay-D4B5-5G-EXT</span></div>
    <div class="wifi-item"><span class="wifi-name">Recámara 1</span><span class="wifi-val" onclick="cp('Totalplay-D4B5_EXT_2')">Totalplay-D4B5_EXT_2</span></div>
    <div class="wifi-item"><span class="wifi-name">Recámara 2</span><span class="wifi-val" onclick="cp('Totalplay-D4B5')">Totalplay-D4B5</span></div>
    <div class="wifi-pass"><span class="wifi-pass-l">${L.passAll}</span><span class="wifi-pass-v" onclick="cp('D4B55712gde5SmAq')">D4B55712gde5SmAq</span></div>
  </div></div>

function updDoor(s){doorState=s;const c=$("door"),l=$("doorLabel");if(!c||!l)return;c.className="circle "+s;
const ic={idle:'<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',opening:'<div class="spinner"></div>',success:'<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',rate:'<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'};
const lb={idle:{t:"${L.tapOpen}",c:"#e5e5e5"},opening:{t:L.opening,c:"#818cf8"},success:{t:L.doorOpen,c:"#34d399"},error:{t:L.errRetry,c:"#f87171"},rate:{t:L.waitMoment,c:"#fb923c"}};
c.innerHTML=ic[s]||ic.idle;l.textContent=lb[s]?lb[s].t:"";l.style.color=lb[s]?lb[s].c:"#e5e5e5"}

async function openDoor(){if(doorState!=="idle")return;updDoor("opening");
try{const r=await fetch(WORKER_URL+"/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:currentPin})});
if(r.status===429){updDoor("rate");setTimeout(()=>updDoor("idle"),5000);return}
const d=await r.json();if(d.success){updDoor("success");setTimeout(()=>updDoor("idle"),4000)}else{updDoor("error");setTimeout(()=>updDoor("idle"),3000)}}
catch(e){updDoor("error");setTimeout(()=>updDoor("idle"),3000)}}

function tog(h){h.nextElementSibling.classList.toggle("open");h.querySelector(".chev").classList.toggle("open")}
function cp(t){navigator.clipboard.writeText(t).then(()=>{$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1500)})}

function init(){renderLoading();setTimeout(()=>renderPinEntry(),500)}
init();
</script>
