<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defihaus Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e5e5e5;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:24px}
.c{max-width:480px;margin:0 auto}
.brand{font-size:10px;letter-spacing:4px;color:#3a3a3a;text-transform:uppercase;font-weight:600;margin-bottom:6px}
h1{font-size:22px;font-weight:700;margin-bottom:24px}
.login{text-align:center;padding:80px 0}
.login input{width:200px;padding:14px;background:#141414;border:1px solid #262626;border-radius:10px;color:#e5e5e5;font-size:20px;text-align:center;letter-spacing:6px;outline:none;font-family:'JetBrains Mono',monospace;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.login button{width:200px;padding:14px;background:#e5e5e5;color:#0a0a0a;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.reservation{background:#141414;border:1px solid #1f1f1f;border-radius:12px;padding:16px;margin-bottom:10px}
.res-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.res-guest{font-size:15px;font-weight:600}
.res-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px}
.badge-active{background:#052e16;color:#4ade80}
.badge-upcoming{background:#1e1b4b;color:#818cf8}
.badge-expired{background:#1c1917;color:#78716c}
.res-dates{font-size:12px;color:#737373;margin-bottom:10px}
.res-pin{display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;padding:10px 14px;border-radius:8px}
.res-pin-label{font-size:11px;color:#525252}
.res-pin-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#fbbf24;letter-spacing:4px}
.res-pin-copy{background:#262626;border:none;color:#a3a3a3;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.res-msg{margin-top:8px}
.res-msg{display:grid;grid-template-columns:1fr;gap:8px}
.res-msg button{width:100%;padding:10px;background:#262626;border:none;border-radius:8px;color:#a3a3a3;font-size:12px;cursor:pointer;font-family:inherit}
.res-msg a{display:block;width:100%;padding:10px;background:#171717;border:1px solid #262626;border-radius:8px;color:#d4d4d4;font-size:12px;text-align:center;text-decoration:none}
.section-title{font-size:11px;color:#525252;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}
.open-btn{width:100%;padding:14px;background:#1a3a2a;border:1px solid #22c55e;border-radius:10px;color:#4ade80;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:20px;font-family:inherit}
.log{background:#141414;border:1px solid #1f1f1f;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:12px;color:#737373;display:flex;justify-content:space-between}
.log-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:#525252}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#34d399;color:#0a0a0a;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #1a1a1a;border-top:2px solid #525252;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#f87171;font-size:13px;margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="c" id="app"></div>
<div class="toast" id="toast">Copiado</div>
<script>
const WORKER="https://puerta-narvarte.danielangelfidel.workers.dev";
const ACCESS_URL="https://navarte2.romanortehost.com";
const ROOM_ONE_GUIDE_URL=ACCESS_URL+"/checkin-habitacion-uno.html";
const HOUSE_GUIDE_URL=ACCESS_URL+"/checkin-casa-completa.html";
const ARRIVAL_STEPS=[
  {
    image:"",
    text:"Check-in is after 4:00 p.m."
  },
  {
    image:"",
    text:"Once you are at the door, simply open the following link and enter the code we will send you below. You will see a padlock icon at the top; just click on the padlock, and the door will open."
  },
  {
    image:"",
    text:"The door will ring, and you will need to push the door open to enter the building."
  },
  {
    image:"",
    text:"Go up the stairs in front of you. Right on the right side is our apartment."
  },
  {
    image:"",
    text:"The keys to the apartment are inside the lockbox located on the door. The code is 0000, and slide the lever down."
  },
  {
    image:"",
    text:"The colored key is for the apartment. The square key is for the building. The third key is for your room."
  },
  {
    image:"",
    text:"Your room is #1, and your trash can is in the kitchen in a solo #1. Please remember that this is a shared space, and we ask that you respect all the rules of coexistence during your stay."
  },
  {
    image:"",
    text:"Your room is on the right as you enter the apartment, next to the kitchen."
  }
];
const $=id=>document.getElementById(id);
let logs=JSON.parse(localStorage.getItem("dh_logs")||"[]");
let adminKey="";

function adminHeaders(){
  return {Authorization:"Bearer "+adminKey};
}

function toast(message){
  $("toast").textContent=message||"Copiado";
  $("toast").classList.add("show");
  setTimeout(()=>{$("toast").classList.remove("show");$("toast").textContent="Copiado"},2000);
}

function renderLogin(){
$("app").innerHTML=`
  <div class="login">
  <div class="brand">Defihaus Admin</div>
  <div style="font-size:16px;font-weight:600;margin-bottom:20px;color:#d4d4d4">PIN de administrador</div>
  <input type="password" id="pin" placeholder="••••" maxlength="80" autocomplete="current-password">
  <button onclick="login()">Entrar</button>
  <div class="err" id="err"></div>
</div>`;
$("pin").focus();
$("pin").addEventListener("keydown",e=>{if(e.key==="Enter")login()});
}

function login(){
  adminKey=$("pin").value.trim();
  if(!adminKey){$("err").textContent="Ingresa el PIN de administrador";return}
  renderDashboard();
}

async function renderDashboard(){
$("app").innerHTML='<div class="brand">Defihaus</div><h1>Admin Dashboard</h1><div style="text-align:center"><div class="spinner"></div><div style="font-size:12px;color:#525252;margin-top:8px">Cargando reservas...</div></div>';
try{
  const r=await fetch(WORKER+"/api/admin/pins",{headers:adminHeaders()});
  if(r.status===401){adminKey="";renderLogin();$("err").textContent="PIN incorrecto o no actualizado en Cloudflare";return}
  const d=await r.json();
  let html='<div class="brand">Defihaus</div><h1>Admin Dashboard</h1>';
  
  // Open door button (admin override)
  html+='<button class="open-btn" id="openBtn" onclick="adminOpen()">🔓 Abrir puerta (admin)</button>';
  
  // Active reservations
  const active=d.reservations.filter(r=>r.active);
  const upcoming=d.reservations.filter(r=>!r.active&&new Date(r.checkIn)>new Date());
  
  if(active.length){
    html+='<div class="section-title">Reserva activa</div>';
    active.forEach(r=>{html+=renderRes(r,"active")});
  }
  if(upcoming.length){
    html+='<div class="section-title">Próximas reservas</div>';
    upcoming.forEach(r=>{html+=renderRes(r,"upcoming")});
  }
  if(!active.length&&!upcoming.length){
    html+='<div style="text-align:center;padding:40px 0;color:#525252">No hay reservas activas ni próximas</div>';
  }
  
  // Open logs
  if(logs.length){
    html+='<div class="section-title">Últimas aperturas</div>';
    logs.slice(0,20).forEach(l=>{
      html+='<div class="log"><span>'+l.guest+'</span><span class="log-time">'+l.time+'</span></div>';
    });
  }
  
  $("app").innerHTML=html;
}catch(e){
  $("app").innerHTML='<div class="brand">Defihaus</div><h1>Admin</h1><div class="err">Error al cargar: '+e.message+'</div>';
}
}

function renderRes(r,type){
const badge=type==="active"?'<span class="res-badge badge-active">ACTIVO</span>':'<span class="res-badge badge-upcoming">PRÓXIMO</span>';
const listingStyles={
  room:"#1e1b4b;color:#818cf8",
  house:"#2e1b0e;color:#fb923c",
  "listing-3":"#042f2e;color:#2dd4bf",
  "listing-4":"#3b0764;color:#d8b4fe",
  "listing-5":"#3f1d1d;color:#fca5a5"
};
const listBadge=r.listing?'<span class="res-badge" style="background:'+(listingStyles[r.label]||"#1c1917;color:#a8a29e")+'">'+r.listing+'</span>':"";
const ci=new Date(r.checkIn).toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
const co=new Date(r.checkOut).toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
const guestArg=JSON.stringify(r.guest||"");
const pinArg=JSON.stringify(r.pin||"");
const listingArg=JSON.stringify(r.listing||"");
const guideUrl=guideUrlForListing(r.listing);
return`<div class="reservation">
<div class="res-header"><span class="res-guest">${r.guest}</span><div>${listBadge} ${badge}</div></div>
<div class="res-dates">📅 ${ci} → ${co}</div>
<div class="res-pin">
  <div><div class="res-pin-label">PIN</div><div class="res-pin-value">${r.pin}</div></div>
  <button class="res-pin-copy" onclick="cp('${r.pin}')">Copiar</button>
</div>
<div class="res-msg">
  <button onclick='cpMsg(${guestArg},${pinArg},${listingArg})'>📋 Copiar mensaje Airbnb + guía visual</button>
  ${guideUrl?`<a href="${guideUrl}" target="_blank">Ver guía visual</a>`:""}
</div>
</div>`;
}

async function adminOpen(){
const btn=$("openBtn");
btn.textContent="🔓 Abriendo...";btn.disabled=true;
try{
  const r=await fetch(WORKER+"/api/open",{method:"POST",headers:{...adminHeaders(),"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  if(d.success){
    btn.textContent="✅ Puerta abierta";btn.style.borderColor="#34d399";
    const now=new Date().toLocaleString("es-MX",{timeZone:"America/Mexico_City",hour:"2-digit",minute:"2-digit",day:"numeric",month:"short"});
    logs.unshift({guest:"Admin",time:now});
    localStorage.setItem("dh_logs",JSON.stringify(logs.slice(0,50)));
    setTimeout(()=>{btn.textContent="🔓 Abrir puerta (admin)";btn.disabled=false;btn.style.borderColor="#22c55e"},3000);
  }else{
    btn.textContent="❌ Error";setTimeout(()=>{btn.textContent="🔓 Abrir puerta (admin)";btn.disabled=false},2000);
  }
}catch(e){btn.textContent="❌ Error";setTimeout(()=>{btn.textContent="🔓 Abrir puerta (admin)";btn.disabled=false},2000)}
}

function cp(t){navigator.clipboard.writeText(t).then(()=>toast("Copiado"))}

function isRoomWithPrivateBath(listing){
  return (listing||"").toLowerCase().includes("aseo dentro");
}

function isFullHouse(listing){
  return (listing||"").toLowerCase().includes("casa completa");
}

function guideUrlForListing(listing){
  if(isRoomWithPrivateBath(listing)) return ROOM_ONE_GUIDE_URL;
  if(isFullHouse(listing)) return HOUSE_GUIDE_URL;
  return "";
}

function generalAirbnbMessage(pin,listing){
const listingLine=listing?`\nAlojamiento: ${listing}\n`:"";
return`Hola,

Tu llegada es sencilla. Te compartimos un código para abrir automáticamente la entrada principal del edificio.${listingLine}
Link de acceso:
${ACCESS_URL}

PIN:
${pin}

Cuando estés en la entrada del edificio, abre el link, introduce el PIN y toca el icono del candado para abrir la puerta principal.

En el mismo link también encontrarás el WiFi, la dirección, las reglas de la casa y recomendaciones del barrio.

Si tienes cualquier duda durante tu llegada, escríbenos por aquí y te ayudamos.`;
}

function generalAirbnbHtmlMessage(pin,listing){
const listingHtml=listing?`<p><strong>Alojamiento:</strong> ${listing}</p>`:"";
return`<div>
  <p>Hola,</p>
  <p>Tu llegada es sencilla. Te compartimos un código para abrir automáticamente la entrada principal del edificio.</p>
  ${listingHtml}
  <p><strong>Link de acceso:</strong><br><a href="${ACCESS_URL}">${ACCESS_URL}</a></p>
  <p><strong>PIN:</strong><br><span style="font-size:22px;font-weight:700;letter-spacing:3px">${pin}</span></p>
  <p>Cuando estés en la entrada del edificio, abre el link, introduce el PIN y toca el icono del candado para abrir la puerta principal.</p>
  <p>En el mismo link también encontrarás el WiFi, la dirección, las reglas de la casa y recomendaciones del barrio.</p>
  <p>Si tienes cualquier duda durante tu llegada, escríbenos por aquí y te ayudamos.</p>
</div>`;
}

function airbnbMessage(pin,listing){
const baseGuideUrl=guideUrlForListing(listing);
if(!baseGuideUrl) return generalAirbnbMessage(pin,listing);
const guideUrl=baseGuideUrl;
return`Hola,

Dirección correcta:
Xochicalco 26, Narvarte Poniente, Benito Juárez, 03000 Ciudad de México.
La entrada debe decir 26B.

Esta es la guía para hacer el check-in:
${guideUrl}

Esta es la guía para tu estancia:
${ACCESS_URL}

Tu PIN de acceso es:
${pin}

Introduce este PIN dentro de la guía de check-in. Si Airbnb o Maps te muestran otra ubicación, usa la dirección de este mensaje.

Esperamos que tengas una muy buena estancia. Si tienes cualquier duda durante tu llegada, escríbenos por aquí y te ayudamos.`;
}

function airbnbHtmlMessage(pin,listing){
const baseGuideUrl=guideUrlForListing(listing);
if(!baseGuideUrl) return generalAirbnbHtmlMessage(pin,listing);
const guideUrl=baseGuideUrl;
return`<div>
  <p>Hola,</p>
  <p><strong>Dirección correcta:</strong><br>Xochicalco 26, Narvarte Poniente, Benito Juárez, 03000 Ciudad de México.<br>La entrada debe decir <strong>26B</strong>.</p>
  <p>Esta es la guía para hacer el check-in:<br><a href="${guideUrl}">${guideUrl}</a></p>
  <p>Esta es la guía para tu estancia:<br><a href="${ACCESS_URL}">${ACCESS_URL}</a></p>
  <p><strong>Tu PIN de acceso es:</strong><br><span style="font-size:22px;font-weight:700;letter-spacing:3px">${pin}</span></p>
  <p>Introduce este PIN dentro de la guía de check-in. Si Airbnb o Maps te muestran otra ubicación, usa la dirección de este mensaje.</p>
  <p>Esperamos que tengas una muy buena estancia. Si tienes cualquier duda durante tu llegada, escríbenos por aquí y te ayudamos.</p>
</div>`;
}

async function cpMsg(guest,pin,listing){
const text=airbnbMessage(pin,listing);
const html=airbnbHtmlMessage(pin,listing);
try{
  if(window.ClipboardItem){
    await navigator.clipboard.write([
      new ClipboardItem({
        "text/plain":new Blob([text],{type:"text/plain"}),
        "text/html":new Blob([html],{type:"text/html"})
      })
    ]);
  }else{
    await navigator.clipboard.writeText(text);
  }
  toast(ARRIVAL_STEPS.some(step=>step.image)?"Mensaje visual copiado":"Mensaje copiado");
}catch(e){
  await navigator.clipboard.writeText(text);
  toast("Mensaje copiado");
}
}

renderLogin();
</script>
</body>
</html>
